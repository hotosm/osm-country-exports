# Sweep order is hardcoded: priority -> normal -> big.
# Each group has an enabled flag (skip the whole group) and a country map.
# Each country maps to a cadence: daily | weekly | monthly.
#
# Move a country between cadences: edit its cadence value.
# Move a country between groups:   cut its line, paste into another section.
#
# Override one country's export by dropping configs/countries/<ISO3>.yaml.
# Enumerates every ISO3 from pycountry except ATA.

