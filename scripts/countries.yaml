# Each country carries two tags:
#   group:     priority | normal | big
#              Sweep ordering only. priority runs first, big last (so an
#              early failure on a big country doesn't burn hours).
#   schedule:  daily | weekly | monthly
#              Cron cadence. Each cron tick runs only its cadence.
#
# schedule.<name>.enabled flips a cadence off without touching cron;
# the sweep then prints a skip line and exits 0.
#
# Override one country's export by dropping configs/countries/<ISO3>.yaml.
# Enumerates every ISO3 from pycountry except ATA.

schedule:
  daily:   { enabled: true }
  weekly:  { enabled: true }
  monthly: { enabled: true }

countries:
