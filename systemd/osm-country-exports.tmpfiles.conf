# Age-based cleanup of OEX data dirs. Applied daily by
# systemd-tmpfiles-clean.timer. Paths must mirror OEX_DATA_DIR in .env;
# update both if you relocate.
#
# Type  Path                       Mode  User Group Age
d       /mnt/disk/oex/output       0755  oex  oex   30d
d       /mnt/disk/oex/data/osm     0755  oex  oex   30d
d       /mnt/disk/oex/data/pcodes  0755  oex  oex   30d
